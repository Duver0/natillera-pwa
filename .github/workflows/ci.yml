name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          cd backend
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install pytest pytest-asyncio pytest-cov
      - name: Run calculation tests
        run: |
          cd backend
          .venv/bin/pytest tests/test_calculations.py tests/test_interest_calculation.py tests/test_mora_detection.py -v

  test-backend-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          cd backend
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install pytest pytest-asyncio pytest-cov
      - name: Run integration tests
        run: |
          cd backend
          .venv/bin/pytest tests/integration/ -v --ignore=tests/test_auth_endpoints.py

  test-backend-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          cd backend
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install pytest pytest-asyncio pytest-cov
      - name: Run contract tests
        run: |
          cd backend
          .venv/bin/pytest tests/contract/test_payment_endpoints_contract.py -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm install
      - name: Run frontend tests
        run: cd frontend && npm test
      - name: Build frontend
        run: cd frontend && npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install linting tools
        run: pip install ruff
      - name: Run ruff
        run: |
          cd backend && ruff check app/
          cd frontend && ruff check src/ || true

  deploy-blocker:
    needs: [test-backend-unit, test-backend-integration, test-backend-contract, lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all required jobs passed
        run: |
          FAILED=0
          if [ "${{ needs.test-backend-unit.result }}" != "success" ]; then FAILED=1; fi
          if [ "${{ needs.test-backend-integration.result }}" != "success" ]; then FAILED=1; fi
          if [ "${{ needs.test-backend-contract.result }}" != "success" ]; then FAILED=1; fi
          if [ "${{ needs.lint.result }}" != "success" ]; then FAILED=1; fi
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "All tests passed. Ready to deploy."